<style>
        .glass-surface {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 10px 30px rgba(124, 131, 253, 0.1);
        }
        .input-glass {
            background: rgba(255, 255, 255, 0.4);
            border: 1px solid rgba(118, 118, 133, 0.1);
            transition: all 0.3s ease;
        }
        .input-glass:focus {
            border-color: #474dc5;
            background: rgba(255, 255, 255, 0.8);
            box-shadow: 0 0 0 4px rgba(71, 77, 197, 0.1);
            outline: none;
        }
        .primary-gradient {
            background: linear-gradient(135deg, #474dc5 0%, #6067df 100%);
        }
        .logo-gradient {
            background: linear-gradient(135deg, #bfc2ff 0%, #e0e0ff 100%);
        }
    </style>
</head>
<body class="bg-background font-body-lg text-on-background min-h-screen flex flex-col relative overflow-hidden">
<div class="absolute inset-0 z-0 overflow-hidden pointer-events-none">
<div class="absolute -top-[10%] -left-[10%] w-[40%] h-[40%] rounded-full bg-primary/10 blur-[120px]"></div>
<div class="absolute bottom-[5%] right-[5%] w-[30%] h-[30%] rounded-full bg-tertiary-fixed-dim/20 blur-[100px]"></div>
<div class="absolute top-[20%] right-[10%] w-[25%] h-[25%] rounded-full bg-secondary-fixed/15 blur-[80px]"></div>
</div>
<header class="w-full px-container-margin py-6 flex justify-end items-center relative z-10">
<div class="flex items-center gap-2 px-4 py-2 glass-surface rounded-full cursor-pointer hover:bg-white/90 transition-all">
<span class="material-symbols-outlined text-primary text-lg" data-icon="language">language</span>
<span class="font-label-caps text-label-caps text-on-surface-variant">English</span>
<span class="material-symbols-outlined text-outline text-sm" data-icon="expand_more">expand_more</span>
</div>
</header>
<main class="flex-grow flex items-center justify-center p-gutter relative z-10">
<div class="w-full max-w-md">
<div class="glass-surface p-10 rounded-[32px] flex flex-col items-center">
<div class="mb-8 flex flex-col items-center gap-4">
<div class="w-16 h-16 logo-gradient rounded-2xl flex items-center justify-center shadow-lg shadow-primary/10">
<span class="text-primary font-headline-xl text-[32px] tracking-tighter">A</span>
</div>
<div class="text-center">
<h1 class="font-headline-md text-headline-md text-primary tracking-tight">Ain Real Estate</h1>
<p class="font-body-sm text-body-sm text-outline mt-1">KPI Management System</p>
</div>
</div>
<form class="w-full flex flex-col gap-6" onsubmit="return false">
<div class="flex flex-col gap-2">
<label class="font-label-caps text-label-caps text-on-surface-variant ml-1">Username</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors" data-icon="person">person</span>
<input class="w-full pl-12 pr-4 py-4 rounded-xl input-glass font-body-sm text-on-surface placeholder:text-outline/50" placeholder="Enter your username" type="text"/>
</div>
</div>
<div class="flex flex-col gap-2">
<div class="flex justify-between items-center px-1">
<label class="font-label-caps text-label-caps text-on-surface-variant">Password</label>
<a class="text-[11px] font-bold text-primary hover:underline transition-all" href="#">Forgot?</a>
</div>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors" data-icon="lock">lock</span>
<input class="w-full pl-12 pr-12 py-4 rounded-xl input-glass font-body-sm text-on-surface placeholder:text-outline/50" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface-variant" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<div class="flex items-center gap-2 px-1">
<input class="w-4 h-4 rounded border-outline-variant text-primary focus:ring-primary/20" id="remember" type="checkbox"/>
<label class="font-body-sm text-body-sm text-on-surface-variant cursor-pointer" for="remember">Remember me for 30 days</label>
</div>
<button class="w-full py-4 primary-gradient text-on-primary font-headline-md text-[16px] rounded-xl shadow-lg shadow-primary/20 hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-2 mt-2" type="submit">
<span>Login</span>
<span class="material-symbols-outlined text-[20px]" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<div class="mt-10 pt-8 border-t border-outline-variant/20 w-full flex flex-col items-center gap-4">
<p class="font-body-sm text-body-sm text-outline">Or sign in with</p>
<div class="flex gap-4">
<button class="w-12 h-12 glass-surface rounded-full flex items-center justify-center hover:bg-white transition-all group">

</button>
<button class="w-12 h-12 glass-surface rounded-full flex items-center justify-center hover:bg-white transition-all group">
<span class="material-symbols-outlined text-outline group-hover:text-primary transition-all" data-icon="fingerprint">fingerprint</span>
</button>
</div>
</div>
</div>
<p class="text-center mt-8 font-body-sm text-body-sm text-outline/70">
                © 2024 Ain Management. All rights reserved.
            </p>
</div>
</main>
<footer class="p-8 flex justify-center gap-8 relative z-10">
<a class="font-label-caps text-label-caps text-outline hover:text-primary transition-colors" href="#">Privacy Policy</a>
<a class="font-label-caps text-label-caps text-outline hover:text-primary transition-colors" href="#">Terms of Service</a>
<a class="font-label-caps text-label-caps text-outline hover:text-primary transition-colors" href="#">Support</a>
</footer>
