{% extends "base.html" %}
{% block title %}Ain KPI{% endblock %}

{% block head %}{% endblock %}

{% block content %}
<div class="page-header">
  <div>
    <h1 class="page-title" data-i18n="mk.title"></h1>
    <p class="page-subtitle" data-i18n="mk.subtitle"></p>
  </div>
  <button class="btn btn-primary" onclick="openNew()" data-i18n="mk.new_campaign"></button>
</div>

<!-- Campaign selector + actions -->
<div class="controls" style="margin-bottom:20px">
  <div class="field" style="min-width:280px">
    <label data-i18n="mk.campaign"></label>
    <select id="campSelect" onchange="selectCampaign()"></select>
  </div>
  <div id="campActions" class="hidden" style="display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap">
    <button class="btn btn-sm" onclick="editCurrent()" data-i18n="common.edit"></button>
    <button class="btn btn-sm btn-danger" onclick="deleteCurrent()" data-i18n="common.delete"></button>
  </div>
</div>

<!-- Empty state -->
<div id="emptyState" class="empty-state">
  <div class="empty-state-icon"><span class="material-symbols-outlined" aria-hidden="true">analytics</span></div>
  <div data-i18n="mk.empty_state"></div>
</div>

<!-- Dashboard — 12 sections, rendered from /api/marketing/campaigns/:id/dashboard -->
<div id="dashboard" class="hidden">

  <!-- 1) Campaign Overview -->
  <section class="mkt-section reveal">
    <h2 class="mkt-section-title">
      <span class="mkt-section-num">1</span>
      <span data-i18n="mk.section_overview"></span>
    </h2>
    <div class="mkt-overview-grid" id="ovOverview"></div>
  </section>

  <!-- 2) Scenario Planning -->
  <section class="mkt-section reveal">
    <h2 class="mkt-section-title">
      <span class="mkt-section-num">2</span>
      <span data-i18n="mk.section_scenarios"></span>
    </h2>
    <div class="mkt-scenarios-row" id="ovScenarios"></div>
    <div class="mkt-recommended" id="ovRecommended"></div>
  </section>

  <!-- 3) Master Funnel Targets -->
  <section class="mkt-section reveal">
    <h2 class="mkt-section-title">
      <span class="mkt-section-num">3</span>
      <span data-i18n="mk.section_master_funnel"></span>
    </h2>
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th data-i18n="mk.kpi"></th>
          <th data-i18n="mk.target_value"></th>
          <th data-i18n="mk.unit"></th>
        </tr></thead>
        <tbody id="ovMaster"></tbody>
      </table>
    </div>
  </section>

  <!-- 4) Dynamic by Spend -->
  <section class="mkt-section reveal">
    <h2 class="mkt-section-title">
      <span class="mkt-section-num">4</span>
      <span data-i18n="mk.section_dynamic_spend"></span>
    </h2>
    <div id="ovDynamicHeadline" class="mkt-headline-row"></div>

    <!-- Inline actuals entry card — always open so marketing users can edit existing values without hunting for a toggle. -->
    <div id="actualsInlineCard" style="display:none;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:18px;margin-top:16px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
        <span id="actualsInlineTitle" style="font-weight:600;font-size:15px;color:var(--text)"></span>
        <span id="actualsSavedHint" style="font-size:12px;color:var(--text-muted);display:none">
          <span class="material-symbols-outlined" aria-hidden="true" style="font-size:14px;vertical-align:-2px">check_circle</span>
          <span data-i18n="mk.actuals_saved"></span>
        </span>
      </div>
      <div id="actualsInlineBody">
        <p id="actualsInlineHint" style="font-size:13px;color:var(--text-muted);margin-bottom:14px"></p>
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px">
          <div class="field">
            <label data-i18n="mk.actual_spend"></label>
            <input type="number" min="0" id="a_spend" class="form-input" placeholder="0">
          </div>
          <div class="field">
            <label data-i18n="mk.actual_leads"></label>
            <input type="number" min="0" id="a_leads" class="form-input" placeholder="0">
          </div>
          <div class="field">
            <label data-i18n="mk.actual_ql"></label>
            <input type="number" min="0" id="a_ql" class="form-input" placeholder="0">
          </div>
          <div class="field">
            <label data-i18n="mk.actual_meetings"></label>
            <input type="number" min="0" id="a_meet" class="form-input" placeholder="0">
          </div>
          <div class="field">
            <label data-i18n="mk.actual_fu"></label>
            <input type="number" min="0" id="a_fu" class="form-input" placeholder="0">
          </div>
          <div class="field">
            <label data-i18n="mk.actual_deals"></label>
            <input type="number" min="0" id="a_deals" class="form-input" placeholder="0">
          </div>
        </div>
        <div style="margin-top:14px">
          <button class="btn btn-primary" onclick="saveActuals()" data-i18n="mk.save_actuals"></button>
        </div>
      </div>
    </div>

    <div class="form-section-title" data-i18n="mk.volume_kpis" style="margin-top:14px"></div>
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th data-i18n="mk.kpi"></th>
          <th data-i18n="mk.col_full_target"></th>
          <th data-i18n="mk.col_progress"></th>
          <th data-i18n="mk.col_dynamic_target"></th>
          <th data-i18n="mk.col_actual"></th>
          <th data-i18n="mk.col_achievement"></th>
          <th data-i18n="mk.col_status"></th>
        </tr></thead>
        <tbody id="ovDynamicVolume"></tbody>
      </table>
    </div>

    <div class="form-section-title" data-i18n="mk.efficiency_kpis" style="margin-top:14px"></div>
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th data-i18n="mk.kpi"></th>
          <th data-i18n="mk.col_target"></th>
          <th data-i18n="mk.col_actual"></th>
          <th data-i18n="mk.col_status"></th>
        </tr></thead>
        <tbody id="ovDynamicEfficiency"></tbody>
      </table>
    </div>
  </section>

  <!-- 5) Time Pacing -->
  <section class="mkt-section reveal" id="sectionTimePacing">
    <h2 class="mkt-section-title">
      <span class="mkt-section-num">5</span>
      <span data-i18n="mk.section_time_pacing"></span>
    </h2>
    <div id="ovTimeHeadline" class="mkt-headline-row"></div>
    <div class="table-wrap" id="ovTimeTableWrap">
      <table>
        <thead><tr>
          <th data-i18n="mk.kpi"></th>
          <th data-i18n="mk.col_full_target"></th>
          <th data-i18n="mk.col_time_progress"></th>
          <th data-i18n="mk.col_time_target"></th>
          <th data-i18n="mk.col_actual"></th>
          <th data-i18n="mk.col_achievement"></th>
          <th data-i18n="mk.col_status"></th>
        </tr></thead>
        <tbody id="ovTimeRows"></tbody>
      </table>
    </div>
  </section>

  <!-- 6) Actual vs Target Summary -->
  <section class="mkt-section reveal">
    <h2 class="mkt-section-title">
      <span class="mkt-section-num">6</span>
      <span data-i18n="mk.section_actual_target"></span>
    </h2>
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th data-i18n="mk.kpi"></th>
          <th data-i18n="mk.col_full_target"></th>
          <th data-i18n="mk.col_dynamic_target"></th>
          <th data-i18n="mk.col_time_target"></th>
          <th data-i18n="mk.col_actual"></th>
          <th data-i18n="mk.col_status"></th>
        </tr></thead>
        <tbody id="ovSummary"></tbody>
      </table>
    </div>
  </section>

  <!-- 7) Period Performance -->
  <section class="mkt-section reveal">
    <h2 class="mkt-section-title">
      <span class="mkt-section-num">7</span>
      <span data-i18n="mk.section_period_perf"></span>
      <button class="btn btn-sm btn-primary mkt-section-cta" onclick="openPeriodForm()">
        <span class="material-symbols-outlined" aria-hidden="true">add</span>
        <span data-i18n="mk.add_period"></span>
      </button>
    </h2>
    <div class="tab-bar" role="tablist" aria-label="Period kinds">
      <button class="tab-btn active" id="ptab-5_day" role="tab" aria-selected="true" tabindex="0" onclick="switchPeriodTab('5_day',this)" data-i18n="mk.period_5_day"></button>
      <button class="tab-btn" id="ptab-daily" role="tab" aria-selected="false" tabindex="-1" onclick="switchPeriodTab('daily',this)" data-i18n="mk.period_daily"></button>
      <button class="tab-btn" id="ptab-weekly" role="tab" aria-selected="false" tabindex="-1" onclick="switchPeriodTab('weekly',this)" data-i18n="mk.period_weekly"></button>
      <button class="tab-btn" id="ptab-monthly" role="tab" aria-selected="false" tabindex="-1" onclick="switchPeriodTab('monthly',this)" data-i18n="mk.period_monthly"></button>
    </div>
    <div id="ovPeriodTable"></div>
  </section>

  <!-- 8) 5-Day Health Check -->
  <section class="mkt-section reveal" id="sectionHealth">
    <h2 class="mkt-section-title">
      <span class="mkt-section-num">8</span>
      <span data-i18n="mk.section_health_check"></span>
    </h2>
    <div id="ovHealthSummary" class="mkt-headline-row"></div>
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th data-i18n="mk.health_period"></th>
          <th data-i18n="mk.kpi_cpl"></th>
          <th data-i18n="mk.kpi_cost_per_deal"></th>
          <th data-i18n="mk.kpi_close_rate"></th>
          <th data-i18n="mk.health_verdict"></th>
        </tr></thead>
        <tbody id="ovHealthRows"></tbody>
      </table>
    </div>
  </section>

  <!-- 9) Insights -->
  <section class="mkt-section reveal">
    <h2 class="mkt-section-title">
      <span class="mkt-section-num">9</span>
      <span data-i18n="mk.section_insights"></span>
    </h2>
    <ul class="mkt-insights" id="ovInsights"></ul>
  </section>

  <!-- 10) Action Plan -->
  <section class="mkt-section reveal">
    <h2 class="mkt-section-title">
      <span class="mkt-section-num">10</span>
      <span data-i18n="mk.section_action_plan"></span>
    </h2>
    <div class="mkt-actions-grid" id="ovActions"></div>
  </section>

  <!-- 11) KPI Entry Templates -->
  <details class="mkt-section mkt-collapsible reveal">
    <summary class="mkt-section-title">
      <span class="mkt-section-num">11</span>
      <span data-i18n="mk.section_templates"></span>
      <span class="material-symbols-outlined mkt-chev" aria-hidden="true">expand_more</span>
    </summary>
    <div id="ovTemplates"></div>
  </details>

  <!-- 12) Formulas -->
  <details class="mkt-section mkt-collapsible reveal">
    <summary class="mkt-section-title">
      <span class="mkt-section-num">12</span>
      <span data-i18n="mk.section_formulas"></span>
      <span class="material-symbols-outlined mkt-chev" aria-hidden="true">expand_more</span>
    </summary>
    <div id="ovFormulas"></div>
  </details>
</div>

{% block scripts %}
<script src="{{ url_for('static', filename='js/charts.js') }}?v=flat51"></script>
<script>
let campaigns = [];
let currentCamp = null;          // selected campaign row
let dashboard = null;             // computed payload from /dashboard endpoint
let editingCampId = null;
let activePeriodKind = "5_day";
let editingPeriod = null;         // {kind, index} or null for new
let pendingPeriodDelete = null;

// ─── Formatters (locale-aware) ──────────────────────────────────────────
const _locale = () => getLang() === "ar" ? "ar-EG" : "en-US";
const fmt0 = n => n == null ? "—" : Number(n).toLocaleString(_locale(), { maximumFractionDigits: 0 });
const fmt2 = n => n == null ? "—" : Number(n).toLocaleString(_locale(), { maximumFractionDigits: 2 });
const fmtPct = n => n == null ? "—" : (Number(n) * 100).toFixed(1) + "%";
const egp = n => fmt2(n) + " " + t("mk.unit_egp");

function escapeHTML(s) {
  return String(s == null ? "" : s).replace(/[&<>"']/g, c => (
    {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]
  ));
}

// ─── Status pill (reuses .badge-* tokens) ───────────────────────────────
const STATUS_BADGE = {
  on_track: { cls: "badge-excellent", icon: "check_circle", key: "mk.status_on" },
  warning:  { cls: "badge-pending",   icon: "warning",      key: "mk.status_warn" },
  critical: { cls: "badge-bad",       icon: "error",        key: "mk.status_crit" },
  n_a:      { cls: "badge-pending",   icon: "remove",       key: "mk.status_na" },
};
function statusBadge(code) {
  const m = STATUS_BADGE[code] || STATUS_BADGE.n_a;
  return `<span class="badge ${m.cls}" style="display:inline-flex;align-items:center;gap:4px">
    <span class="material-symbols-outlined" aria-hidden="true" style="font-size:14px">${m.icon}</span>
    <span>${t(m.key)}</span>
  </span>`;
}
const VERDICT_BADGE = {
  excellent: { cls: "badge-excellent", key: "mk.verdict_excellent" },
  good:      { cls: "badge-vgood",     key: "mk.verdict_good" },
  watch:     { cls: "badge-pending",   key: "mk.verdict_watch" },
  critical:  { cls: "badge-bad",       key: "mk.verdict_critical" },
};
function verdictBadge(v) {
  const m = VERDICT_BADGE[v] || VERDICT_BADGE.good;
  return `<span class="badge ${m.cls}">${t(m.key)}</span>`;
}

// ─── Campaign loading + selection ───────────────────────────────────────
async function loadCampaigns() {
  try {
    campaigns = await api("/api/marketing/campaigns");
    populateSelect();
    if (campaigns.length) {
      const prevId = currentCamp ? currentCamp.id : null;
      const pick = campaigns.find(c => c.id === prevId) || campaigns[0];
      document.getElementById("campSelect").value = pick.id;
      await selectCampaign();
    } else {
      currentCamp = null;
      dashboard = null;
      document.getElementById("emptyState").classList.remove("hidden");
      document.getElementById("dashboard").classList.add("hidden");
      document.getElementById("campActions").classList.add("hidden");
    }
  } catch (e) { toastError(e); }
}

function populateSelect() {
  const sel = document.getElementById("campSelect");
  const prev = sel.value;
  sel.innerHTML = `<option value="">${t("mk.pick_campaign")}</option>` +
    campaigns.map(c => `<option value="${c.id}">${escapeHTML(c.campaign_name)}${c.month ? " (" + c.month + ")" : ""}</option>`).join("");
  if (prev && campaigns.find(c => String(c.id) === prev)) sel.value = prev;
}

async function selectCampaign() {
  const cid = document.getElementById("campSelect").value;
  if (!cid) {
    document.getElementById("dashboard").classList.add("hidden");
    document.getElementById("emptyState").classList.remove("hidden");
    document.getElementById("campActions").classList.add("hidden");
    return;
  }
  currentCamp = campaigns.find(c => String(c.id) === cid);
  document.getElementById("campActions").classList.remove("hidden");
  try {
    dashboard = await api(`/api/marketing/campaigns/${cid}/dashboard`);
    document.getElementById("emptyState").classList.add("hidden");
    document.getElementById("dashboard").classList.remove("hidden");
    renderDashboard();
  } catch (e) { toastError(e); }
}

}

async function selectScenario(key) {
  if (!currentCamp || key === dashboard.recommended) return;
  try {
    await api(`/api/marketing/campaigns/${currentCamp.id}`, {
      method: "PUT",
      body: {
        campaign_name:       currentCamp.campaign_name,
        avg_unit_price:      currentCamp.avg_unit_price,
        campaign_budget:     currentCamp.campaign_budget,
        commission_input:    currentCamp.commission_input,
        commission_type:     currentCamp.commission_type,
        expected_close_rate: parseFloat(currentCamp.expected_close_rate) * 100,
        tax_rate:            parseFloat(currentCamp.tax_rate) * 100,
        start_date:          currentCamp.start_date || null,
        end_date:            currentCamp.end_date   || null,
        review_date:         currentCamp.review_date || null,
        recommended_scenario: key,
      }
    });
    currentCamp.recommended_scenario = key;
    toast("تم اختيار السيناريو: " + key, "success");
    await selectCampaign();   // refresh dashboard
  } catch (e) { toastError(e); }
}

// 9) Insights — surface fixed-template bullets based on observed status flags
function renderInsights() {
  const out = [];
  const d = dashboard.dynamic_by_spend;
  const tp = dashboard.time_pacing;
  const h = dashboard.health_check_5day;
  const a = dashboard.actuals;

  if (tp.available && (tp.spend_pacing_status === "critical" || tp.spend_pacing_status === "warning")) {
    out.push(tp.actual_spend > tp.planned_spend ? "mk.insight_spend_high" : "mk.insight_spend_low");
  }

  if (a.present) {
    const cpl = d.efficiency_rows.find(r => r.kpi === "cpl");
    if (cpl) out.push(cpl.status === "on_track" ? "mk.insight_cpl_ok" : "mk.insight_cpl_high");
    const cpd = d.efficiency_rows.find(r => r.kpi === "cost_per_deal");
    if (cpd && (cpd.status === "warning" || cpd.status === "critical")) out.push("mk.insight_cpd_high");
    const cr = d.efficiency_rows.find(r => r.kpi === "close_rate");
    if (cr) out.push(cr.status === "on_track" ? "mk.insight_close_ok" : "mk.insight_close_low");
    const leads = d.rows.find(r => r.kpi === "leads");
    if (leads && (leads.status === "warning" || leads.status === "critical")) out.push("mk.insight_leads_low");
    const meet = d.rows.find(r => r.kpi === "meetings");
    if (meet && (meet.status === "warning" || meet.status === "critical")) out.push("mk.insight_meetings_low");
    const deals = d.rows.find(r => r.kpi === "deals");
    if (deals) out.push(deals.status === "on_track" ? "mk.insight_deals_strong" : "mk.insight_deals_lag");
  }

  if (h.last_window === "critical") out.push("mk.insight_5day_critical");

  if (tp.available && a.present) {
    const deals = d.rows.find(r => r.kpi === "deals");
    if (deals && deals.achievement != null && deals.achievement < tp.time_progress * 0.95) {
      out.push("mk.insight_time_lag");
    }
  }

  const seen = new Set();
  const insightsHTML = out.filter(k => !seen.has(k) && seen.add(k)).slice(0, 10)
    .map(k => `<li>${t(k)}</li>`).join("");
  document.getElementById("ovInsights").innerHTML = insightsHTML
    || `<li class="text-muted">${t("mk.no_data_yet")}</li>`;
}

function _formClear() {
  ["f_name","f_price","f_budget","f_comm","f_cr","f_tax","f_start_date","f_end_date","f_review_date"]
    .forEach(id => { const el = document.getElementById(id); if (el) el.value = ""; });
  document.getElementById("f_ctype").value = "percentage";
  document.getElementById("f_tax").value = "19";
}

function openNew() {
  editingCampId = null;
  document.getElementById("campModalTitle").textContent = t("mk.modal_title_new");
  _formClear();
  applyLang(true);
  openModal("campModal");
}

function editCurrent() {
  if (!currentCamp) return;
  editingCampId = currentCamp.id;
  document.getElementById("campModalTitle").textContent = t("mk.modal_title_edit");
  document.getElementById("f_name").value   = currentCamp.campaign_name || "";
  document.getElementById("f_price").value  = currentCamp.avg_unit_price || "";
  document.getElementById("f_budget").value = currentCamp.campaign_budget || "";
  document.getElementById("f_comm").value   = currentCamp.commission_input || "";
  document.getElementById("f_ctype").value  = currentCamp.commission_type || "percentage";
  // tax_rate / expected_close_rate are stored as decimals — display as whole percent
  document.getElementById("f_cr").value     = currentCamp.expected_close_rate != null ? Number(currentCamp.expected_close_rate) * 100 : "";
  document.getElementById("f_tax").value    = currentCamp.tax_rate != null ? Math.round(Number(currentCamp.tax_rate) * 100) : 19;
  document.getElementById("f_start_date").value  = currentCamp.start_date || "";
  document.getElementById("f_end_date").value    = currentCamp.end_date   || "";
  document.getElementById("f_review_date").value = currentCamp.review_date || "";
  applyLang(true);
  openModal("campModal");
}

async function saveCampaign() {
  const body = {
    campaign_name:       document.getElementById("f_name").value.trim(),
    avg_unit_price:      parseFloat(document.getElementById("f_price").value) || 0,
    campaign_budget:     parseFloat(document.getElementById("f_budget").value) || 0,
    commission_input:    parseFloat(document.getElementById("f_comm").value) || 0,
    commission_type:     document.getElementById("f_ctype").value,
    expected_close_rate: parseFloat(document.getElementById("f_cr").value) || 0,
    tax_rate:            parseFloat(document.getElementById("f_tax").value) || 19,
    start_date:          document.getElementById("f_start_date").value || null,
    end_date:            document.getElementById("f_end_date").value || null,
    review_date:         document.getElementById("f_review_date").value || null,
  };
  try {
    if (editingCampId) {
      await api(`/api/marketing/campaigns/${editingCampId}`, { method: "PUT", body });
    } else {
      const res = await api("/api/marketing/campaigns", { method: "POST", body });
      currentCamp = { id: res.id };
    }
    closeModal("campModal");
    toast(t("common.saved"), "success");
    await loadCampaigns();
  } catch (e) { toastError(e); }
}

let _pendingDelete = null;
function deleteCurrent() {
  if (!currentCamp) return;
  _pendingDelete = currentCamp.id;
  document.getElementById("campDeleteName").textContent = currentCamp.campaign_name || "";
  openModal("campDeleteModal");
}
async function confirmDelete() {
  if (!_pendingDelete) { closeModal("campDeleteModal"); return; }
  try {
    await api(`/api/marketing/campaigns/${_pendingDelete}`, { method: "DELETE" });
    closeModal("campDeleteModal");
    toast(t("common.deleted"), "success");
    _pendingDelete = null; currentCamp = null; dashboard = null;
    await loadCampaigns();
  } catch (e) { toastError(e); }
}

// ─── Period entry ──────────────────────────────────────────────────────
function openPeriodForm(kind, idx) {
  if (!currentCamp) return;
  editingPeriod = (kind && idx) ? { kind, index: idx } : null;
  document.getElementById("periodModalTitle").textContent =
    editingPeriod ? t("mk.edit_period") : t("mk.add_period");

  const ids = ["pf_index","pf_label","pf_start","pf_end","pf_spend","pf_leads","pf_qleads","pf_meetings","pf_fup","pf_deals","pf_notes"];
  ids.forEach(i => { const el = document.getElementById(i); if (el) el.value = ""; });

  if (editingPeriod) {
    const r = (dashboard.periods[kind] || []).find(x => x.index === idx);
    if (r) {
      document.getElementById("pf_kind").value     = r.kind;
      document.getElementById("pf_index").value    = r.index;
      document.getElementById("pf_label").value    = r.label || "";
      document.getElementById("pf_start").value    = r.start || "";
      document.getElementById("pf_end").value      = r.end || "";
      document.getElementById("pf_spend").value    = r.spend || "";
      document.getElementById("pf_leads").value    = r.leads || "";
      document.getElementById("pf_qleads").value   = r.qualified_leads || "";
      document.getElementById("pf_meetings").value = r.meetings || "";
      document.getElementById("pf_fup").value      = r.follow_ups || "";
      document.getElementById("pf_deals").value    = r.deals || "";
      document.getElementById("pf_notes").value    = r.notes || "";
    }
  } else {
    document.getElementById("pf_kind").value = activePeriodKind;
    const existing = (dashboard.periods[activePeriodKind] || []).map(p => p.index);
    document.getElementById("pf_index").value = (existing.length ? Math.max(...existing) + 1 : 1);
  }
  applyLang(true);
  openModal("periodModal");
}

async function savePeriod() {
  if (!currentCamp) return;
  const body = {
    period_kind:     document.getElementById("pf_kind").value,
    period_index:    parseInt(document.getElementById("pf_index").value, 10) || 0,
    period_label:    document.getElementById("pf_label").value.trim(),
    period_start:    document.getElementById("pf_start").value || null,
    period_end:      document.getElementById("pf_end").value || null,
    spend:           parseFloat(document.getElementById("pf_spend").value) || 0,
    leads:           parseInt(document.getElementById("pf_leads").value, 10) || 0,
    qualified_leads: parseInt(document.getElementById("pf_qleads").value, 10) || 0,
    meetings:        parseInt(document.getElementById("pf_meetings").value, 10) || 0,
    follow_ups:      parseInt(document.getElementById("pf_fup").value, 10) || 0,
    deals:           parseInt(document.getElementById("pf_deals").value, 10) || 0,
    notes:           document.getElementById("pf_notes").value || null,
  };
  if (!body.period_label || body.period_index < 1) {
    toast(t("errors.required_fields_missing"), "error");
    return;
  }
  try {
    await api(`/api/marketing/campaigns/${currentCamp.id}/periods`, { method: "POST", body });
    closeModal("periodModal");
    toast(t("common.saved"), "success");
    await selectCampaign();   // refresh dashboard
  } catch (e) { toastError(e); }
}

function deletePeriod(kind, idx, label) {
  pendingPeriodDelete = { kind, idx };
  document.getElementById("periodDeleteLabel").textContent = label || "";
  openModal("periodDeleteModal");
}

async function confirmPeriodDelete() {
  if (!pendingPeriodDelete || !currentCamp) { closeModal("periodDeleteModal"); return; }
  const { kind, idx } = pendingPeriodDelete;
  try {
    await api(`/api/marketing/campaigns/${currentCamp.id}/periods/${kind}/${idx}`, { method: "DELETE" });
    closeModal("periodDeleteModal");
    toast(t("common.deleted"), "success");
    pendingPeriodDelete = null;
    await selectCampaign();
  } catch (e) { toastError(e); }
}

// ─── Lifecycle ─────────────────────────────────────────────────────────
function onLangChange() { if (dashboard) renderDashboard(); }
function onThemeChange() { if (dashboard) renderDashboard(); }

loadCampaigns();

</script>
{% endblock %}
